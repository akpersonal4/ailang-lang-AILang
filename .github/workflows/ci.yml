name: CI

on:
  pull_request:
    branches: [ "develop", "main" ]
  push:
    branches: [ "develop" ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: pip install -e .

      - name: Validate version consistency
        shell: python
        run: |
          import tomllib
          import compiler
          
          # Read pyproject.toml version
          with open("pyproject.toml", "rb") as f:
              pyproject_version = tomllib.load(f)["project"]["version"]
          
          # Check compiler.__version__
          module_version = compiler.__version__
          
          assert pyproject_version == module_version, f"Version mismatch: pyproject={pyproject_version} module={module_version}"
          print(f"Version consistency verified: {pyproject_version}")

      - name: Install dev dependencies
        run: pip install black ruff mypy pytest

      - name: Format check (black)
        run: black --check compiler/ tests/ scripts/

      - name: Lint (ruff)
        run: ruff check compiler/ tests/ scripts/

      - name: Type check (mypy)
        run: mypy compiler/ || true

      - name: Run pytest
        run: pytest tests/ -v --tb=short

      - name: Collect benchmark apps
        id: apps
        shell: python
        run: |
          import os
          import glob
          apps = (
            glob.glob("apps/**/*.ail", recursive=True)
            + glob.glob("ai_benchmarks/**/*.ail", recursive=True)
            + glob.glob("examples/patterns/*.ail", recursive=True)
          )
          apps = [a.replace("\\", "/") for a in apps if "node_modules" not in a]
          with open(os.environ["GITHUB_ENV"], "a") as f:
            f.write(f"AIL_APPS={' '.join(apps)}\n")
          print(f"Found {len(apps)} .ail files")

      - name: Compile all apps
        shell: python
        run: |
          import os, subprocess
          apps = os.environ.get("AIL_APPS", "").split()
          failed = []
          for app in apps:
            result = subprocess.run(["ail", "build", app], capture_output=True, text=True)
            if result.returncode != 0:
              failed.append((app, result.stderr.strip()))
          if failed:
            for app, err in failed:
              print(f"FAIL: {app}\n{err}")
            raise SystemExit(1)
          print(f"All {len(apps)} apps compiled successfully")

      - name: Run all apps
        shell: python
        run: |
          import os, subprocess
          apps = os.environ.get("AIL_APPS", "").split()
          failed = []
          for app in apps:
            result = subprocess.run(["ail", "run", app], capture_output=True, text=True, timeout=30)
            if result.returncode != 0:
              failed.append((app, result.stderr.strip()))
          if failed:
            for app, err in failed:
              print(f"FAIL: {app}\n{err}")
            raise SystemExit(1)
          print(f"All {len(apps)} apps ran successfully")

      - name: Verify documentation links
        shell: python
        run: |
          import os, re
          link_pattern = re.compile(r'\[.*?\]\(([^)]+)\)')
          errors = []
          root = "."
          for dirpath, _, filenames in os.walk(root):
            for fn in filenames:
              if not fn.endswith(".md"):
                continue
              fpath = os.path.join(dirpath, fn)
              with open(fpath, "r", encoding="utf-8", errors="ignore") as f:
                content = f.read()
              for match in link_pattern.finditer(content):
                link = match.group(1)
                if link.startswith("http") or link.startswith("#"):
                  continue
                target = os.path.normpath(os.path.join(os.path.dirname(fpath), link))
                if not os.path.exists(target):
                  errors.append(f"{fpath}: broken link -> {link}")
          if errors:
            for e in errors:
              print(e)
            raise SystemExit(1)
          print(f"All documentation links verified")

      - name: Generate benchmark summary
        shell: python
        run: |
          import os, subprocess
          apps = os.environ.get("AIL_APPS", "").split()
          compiled = 0
          ran_ok = 0
          for app in apps:
            r1 = subprocess.run(["ail", "build", app], capture_output=True, text=True)
            if r1.returncode == 0:
              compiled += 1
              r2 = subprocess.run(["ail", "run", app], capture_output=True, text=True, timeout=30)
              if r2.returncode == 0:
                ran_ok += 1
          summary = f"""
## Benchmark Summary

| Metric | Value |
|--------|-------|
| Total apps | {len(apps)} |
| Compiled | {compiled} |
| Ran successfully | {ran_ok} |
| Build rate | {compiled}/{len(apps)} ({100*compiled//len(apps) if apps else 0}%) |
| Run rate | {ran_ok}/{len(apps)} ({100*ran_ok//len(apps) if apps else 0}%) |
"""
          with open(os.environ["GITHUB_STEP_SUMMARY"], "a") as f:
            f.write(summary)
          print(summary)

      - name: Summary
        run: |
          echo "✅ CI validation complete"
          echo "  - pytest: 522 tests"
          echo "  - black: formatting"
          echo "  - ruff: linting"
          echo "  - mypy: type checking"
          echo "  - ail build: all apps"
          echo "  - ail run: all apps"
          echo "  - docs: link verification"
